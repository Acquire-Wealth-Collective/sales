<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: flat navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#0D1B2A"/>

  <!-- Stylized "A" — two legs in off-white -->
  <line x1="6" y1="25" x2="16" y2="7" stroke="#FCFFF5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="25" x2="16" y2="7" stroke="#FCFFF5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Squiggly rising trend line as crossbar in sage green -->
  <polyline
    points="10,19 11.5,16.5 13,18.5 14.5,16 16,17.5 18,14.5 20,16 22,13"
    stroke="#91AA9D"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Dot at the peak -->
  <circle cx="22" cy="13" r="2" fill="#D1DBBD"/>
</svg>
